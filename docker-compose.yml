services:
  db:
    image: postgres:15
    container_name: weave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - "5432:5432"
    volumes:
      - weave_pgdata:/var/lib/postgresql/data

volumes:
  weave_pgdata:
